name: Build, Publish and Release TRX Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build -c Release --no-restore

    - name: Publish single EXE
      run: dotnet publish "TRX Launcher/TRX Launcher.csproj" -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeAllContentForSelfExtract=false /p:EnableCompressionInSingleFile=true -o ./publish --no-build

    - name: Create ZIP
      run: |
        if (Test-Path ./TRX_Launcher.zip) { Remove-Item ./TRX_Launcher.zip -Force }
        Compress-Archive -Path ./publish/* -DestinationPath ./TRX_Launcher.zip -Force

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0       # cambiare versione ad ogni release
        name: TRX Launcher v1.0.0
        body: "TRX Launcher Release - ZIP self-contained con WPF"
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}

    - name: Upload ZIP to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        files: TRX_Launcher.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
