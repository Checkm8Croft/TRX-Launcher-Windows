name: Build and Publish TRX Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # If there's a single solution file in the repo root, dotnet restore and build
    # without a path will operate on it. This avoids hard-coding the exact .sln name.
    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build -c Release --no-restore

    # Publish the specific project which is in the subfolder named "TRX Launcher".
    # Use quotes because the folder name contains a space.
    - name: Publish self-contained folder
      run: dotnet publish "TRX Launcher/TRX Launcher.csproj" -c Release -r win-x64 --self-contained true /p:PublishSingleFile=false -o ./publish --no-build

    - name: Create ZIP
      run: |
        if (Test-Path ./TRX_Launcher.zip) { Remove-Item ./TRX_Launcher.zip -Force }
        Compress-Archive -Path ./publish/* -DestinationPath ./TRX_Launcher.zip -Force

    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: TRX_Launcher_ZIP
        path: TRX_Launcher.zip
