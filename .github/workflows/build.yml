name: Build and Publish TRX Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Debug - list files (verify csproj path)
      run: |
        Write-Host "Current working directory: $(Get-Location)"
        Get-ChildItem -File -Recurse | Select-Object FullName

    - name: Restore dependencies
      run: dotnet restore 'TRX-Launcher\TRX Launcher\TRX Launcher.csproj'

    - name: Build Release
      run: dotnet build 'TRX-Launcher\TRX Launcher\TRX Launcher.csproj' -c Release --no-restore

    - name: Publish self-contained folder
      run: dotnet publish 'TRX-Launcher\TRX Launcher\TRX Launcher.csproj' -c Release -r win-x64 --self-contained true /p:PublishSingleFile=false -o ./publish --no-build

    - name: Create ZIP
      run: |
        if (Test-Path ./TRX_Launcher.zip) { Remove-Item ./TRX_Launcher.zip -Force }
        Compress-Archive -Path ./publish/* -DestinationPath ./TRX_Launcher.zip -Force

    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: TRX_Launcher_ZIP
        path: TRX_Launcher.zip
